name: Build and Publish Release APK

on:
  # Memicu Action secara otomatis ketika Anda membuat tag baru (misal: v1.0.0)
  push:
    tags:
      - 'v*'
  # Memungkinkan Anda menjalankan Action ini secara manual dari tab "Actions"
  workflow_dispatch: 

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    
    # PENTING: Izin ini wajib ada agar Action bisa membuat Release di tab Releases
    permissions:
      contents: write 

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      # (Opsional) Mengatur versi Java. Sesuaikan dengan kebutuhan proyek Android tersebut
      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      # Menjalankan Action dari Marketplace yang Anda minta
      - name: Build and Publish APK
        uses: OziomaOgbe/build-and-publish-release-apk-from-your-android-project@v1.0.1 # Pastikan menggunakan versi terbaru Action tersebut
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
