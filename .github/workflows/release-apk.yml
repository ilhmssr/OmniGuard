name: Publish Release APK

on:
  push:
    tags: [ "*" ]
  workflow_dispatch: # Saya tambahkan ini agar Anda tetap punya tombol manual

jobs:
  publish:
    runs-on: ubuntu-latest

    # PENTING: Wajib ada agar Action punya izin membuat Release
    permissions:
      contents: write 

    steps:
    - uses: actions/checkout@v3
    
    - name: set up JDK 11
      uses: actions/setup-java@v3
      with:
        java-version: '11'
        distribution: 'temurin'
        cache: gradle

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew
      
    # Ubah ke assembleDebug karena Anda tidak punya Keystore/Password asli dari pemilik repo
    - name: Build APK
      run: ./gradlew assembleDebug 
      
    - name: Publish APK
      uses: alsrb968/action-release-apk@master
      env:
        # Ubah secrets.TOKEN menjadi secrets.GITHUB_TOKEN (ini bawaan otomatis dari GitHub)
        GITHUB_TOKEN: ${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}
        APP_FOLDER: app
